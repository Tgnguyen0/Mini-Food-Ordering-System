# Server configuration
server.port=9003

# MariaDB Connection Strings
# Thay 'localhost' b?ng IP c?a máy cŕi MariaDB n?u ch?y khác máy
# spring.datasource.url=jdbc:mariadb://localhost:3306/food_user_db?createDatabaseIfNotExist=true
# spring.datasource.username=root
# spring.datasource.password=sapassword

spring.datasource.url=jdbc:mariadb://localhost:3306/food_user_db?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=123

spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

# JPA & Hibernate Settings
spring.jpa.database-platform=org.hibernate.dialect.MariaDBDialect
# 'update' t? ??ng t?o/s?a b?ng d?a tręn Entity.
# 'validate' s? ki?m tra xem database có kh?p v?i code không (khuyęn důng cho production)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

