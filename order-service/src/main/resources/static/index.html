<!DOCTYPE html>
<html>
<head>
    <title>Service Demo</title>
</head>
<body>

<h2>Create Order</h2>
<input id="name" placeholder="Product">
<input id="qty" placeholder="Quantity">
<button onclick="createOrder()">Create</button>

<h2>Pay</h2>
<input id="orderIdPay" placeholder="Order ID">
<input id="amount" placeholder="Amount">
<button onclick="pay()">Pay</button>

<h2>Shipping</h2>
<input id="orderIdShip" placeholder="Order ID">
<input id="address" placeholder="Address">
<button onclick="ship()">Ship</button>

<script>
    function createOrder() {
        fetch('http://localhost:8081/orders', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                productName: document.getElementById('name').value,
                quantity: document.getElementById('qty').value
            })
        }).then(res => res.json()).then(console.log);
    }

    function pay() {
        console.log("PAY CLICKED");
        fetch('http://localhost:8080/api/payments', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                orderId: document.getElementById('orderIdPay').value,
                amount: document.getElementById('amount').value
            })
        }).then(res => res.json()).then(console.log);
    }

    function ship() {
        console.log("Shipping CLICKED");
        fetch('http://localhost:8080/api/shippings', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                orderId: document.getElementById('orderIdShip').value,
                address: document.getElementById('address').value
            })
        }).then(res => res.json()).then(console.log);
    }
</script>

</body>
</html>
